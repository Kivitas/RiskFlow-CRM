<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#02051F"/>
      <stop offset="100%" stop-color="#18003D"/>
    </linearGradient>

    <linearGradient id="logoGrad" x1="300" y1="300" x2="760" y2="780">
      <stop offset="0%" stop-color="#0F6BFF"/>
      <stop offset="100%" stop-color="#A445FF"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="40" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.8">
    <circle cx="100" cy="120" r="2"/>
    <circle cx="210" cy="80" r="1.5"/>
    <circle cx="330" cy="160" r="2"/>
    <circle cx="460" cy="90" r="1.5"/>
    <circle cx="590" cy="150" r="2"/>
    <circle cx="720" cy="100" r="1.5"/>
    <circle cx="860" cy="180" r="2"/>
    <circle cx="920" cy="90" r="1.5"/>
    <circle cx="140" cy="320" r="2"/>
    <circle cx="250" cy="420" r="1.5"/>
    <circle cx="760" cy="350" r="2"/>
    <circle cx="890" cy="520" r="2"/>
    <circle cx="180" cy="700" r="1.5"/>
    <circle cx="340" cy="840" r="2"/>
    <circle cx="520" cy="920" r="1.5"/>
    <circle cx="700" cy="860" r="2"/>
    <circle cx="840" cy="760" r="1.5"/>
  </g>

  <!-- Stylized R -->
  <path
    d="M370 360
       C370 260 450 220 540 220
       H650
       C760 220 840 300 840 400
       C840 500 760 580 650 580
       H560
       L760 780"
    stroke="url(#logoGrad)"
    stroke-width="90"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"/>
</svg>
